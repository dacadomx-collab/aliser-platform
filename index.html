<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aliser | Supermercados y Mayoreo en Baja California Sur</title>
    <meta name="description" content="Aliser: Tu opción líder en abarrotes, carnes y distribución para hoteles en La Paz y Los Cabos.">

    <link rel="stylesheet" href="vendors/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Aliser",
      "image": "https://www.aliser.mx/assets/img/logo.webp",
      "@id": "https://www.aliser.mx",
      "url": "https://www.aliser.mx",
      "telephone": "+52XXXXXXXXXX",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Dirección Principal",
        "addressLocality": "La Paz",
        "addressRegion": "BCS",
        "postalCode": "23000",
        "addressCountry": "MX"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 24.1422,
        "longitude": -110.3128
      },
      "description": "Líder en retail y servicios logísticos para hoteles en Baja California Sur.",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Catálogo Quincenal",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Venta al Mayoreo y Menudeo"
            }
          }
        ]
      }
    }
    </script>
</head>
<body>

    <header id="main-header">
        </header>

    <main>
        <section id="hero" class="chunk">
            <h1>Sabor y Calidad Sin Fronteras</h1>
        </section>

        <section id="ofertas-container" class="container">
            </section>
    </main>

    <script src="vendors/jquery/jquery.min.js"></script>
    <script src="js/main.js" type="module"></script>
    <script src="js/chatbot-ui.js" defer></script>
</body>
</html>
